name: Daily arXiv digest

on:
  schedule:
    - cron: "17 13 * * *"   # ~13:17 UTC daily (kept off the :00 rush)
  workflow_dispatch: {}      # allow manual runs

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build today's digest
        run: python scripts/build_digest.py

      - name: Commit & push if changed
        run: |
          git config user.name "Tong Chen"
          git config user.email "tongchen2010@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily arXiv AI/ML digest — $(date -u +%Y-%m-%d)"
            git push
          fi
